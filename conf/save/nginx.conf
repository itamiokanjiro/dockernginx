# =============================
# React SPA + HTTPS + CORS Nginx
# =============================

map $http_origin $cors_origin {
    default "";
    "~^https://aizen-sousuke\.duckdns\.org(:[0-9]{1,5})?$" $http_origin;
    "~^https://itamiokanjiro\.github\.io$" $http_origin;
    "~^http://localhost:3112$" $http_origin;
    "~^http://192\.168\.1\.104:3112$" $http_origin;
    "~^https://192\.168\.1\.104:8999$" $http_origin;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name aizen-sousuke.duckdns.org www.aizen-sousuke.duckdns.org;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    # SSL
    ssl_certificate /etc/letsencrypt/live/aizen-sousuke.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aizen-sousuke.duckdns.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # CORS（合法位置）
    add_header Access-Control-Allow-Origin "$cors_origin" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
    add_header Access-Control-Allow-Credentials "true" always;

    # CSP
    add_header Content-Security-Policy "default-src 'self' https: data:; img-src 'self' https: data: blob:; media-src 'self' https: blob: data:;" always;

    # React SPA + OPTIONS
    location / {
        # OPTIONS 預檢
        if ($request_method = OPTIONS) {
            return 204;
        }

        try_files $uri /index.html;
    }
}
